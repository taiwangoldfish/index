<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>金魚 AI 問答</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <main class="app-shell">
    <header class="app-header">
      <h1>🐟 金魚 AI</h1>
      <p>僅使用台灣金魚網站資料回答，並附來源。</p>
    </header>

    <section id="chat" class="chat-panel" aria-live="polite"></section>

    <form id="ask-form" class="ask-form">
      <textarea id="question" placeholder="輸入問題，例如：如何翻鰓？按 Enter 送出，Shift+Enter 換行" required></textarea>
      <div class="controls">
        <label for="topk">參考筆數</label>
        <select id="topk">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="8">8</option>
        </select>
        <button type="submit">送出</button>
      </div>
    </form>
  </main>

  <template id="bubble-user">
    <article class="bubble user">
      <div class="meta">你</div>
      <div class="content"></div>
    </article>
  </template>

  <template id="bubble-ai">
    <article class="bubble ai">
      <div class="meta">🐟 金魚 AI</div>
      <div class="content"></div>
    </article>
  </template>

  <script src="/web/app.js"></script>
</body>
</html>
