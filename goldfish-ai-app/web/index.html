<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>金魚 AI 問答</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <main class="app-shell">
    <header class="app-header">
      <h1>🐟 金魚 AI</h1>
      <p>使用金魚網站資料回答，頁面掛在 index 主站下，後端 API 仍由獨立服務提供。</p>
      <p><a href="../../index.html" style="color: var(--accent);">回主站首頁</a></p>
    </header>

    <section id="chat" class="chat-panel" aria-live="polite"></section>

    <form id="ask-form" class="ask-form">
      <textarea id="question" placeholder="輸入問題，例如：如何翻鰓？按 Enter 送出，Shift+Enter 換行" required></textarea>
      <div class="controls">
        <label for="topk">參考筆數</label>
        <select id="topk">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="8">8</option>
        </select>
        <button type="submit">送出</button>
      </div>
    </form>
  </main>

  <template id="bubble-user">
    <article class="bubble user">
      <div class="meta">你</div>
      <div class="content"></div>
    </article>
  </template>

  <template id="bubble-ai">
    <article class="bubble ai">
      <div class="meta">🐟 金魚 AI</div>
      <div class="content"></div>
    </article>
  </template>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
