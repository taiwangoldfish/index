<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Goldfish AI Admin</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <main class="app-shell">
    <header class="app-header">
      <h1>Goldfish AI Admin</h1>
      <p>問答品質與回饋摘要</p>
    </header>

    <section class="chat-panel" id="summary-panel">
      <div class="stats-grid">
        <article class="stat-card"><h3>總提問</h3><p id="total-asks">0</p></article>
        <article class="stat-card"><h3>總回饋</h3><p id="total-feedback">0</p></article>
        <article class="stat-card"><h3>👍</h3><p id="up-count">0</p></article>
        <article class="stat-card"><h3>👎</h3><p id="down-count">0</p></article>
        <article class="stat-card"><h3>平均信心</h3><p id="avg-confidence">0.00</p></article>
      </div>

      <div class="admin-list-wrap">
        <section>
          <h2>熱門問題 Top 10</h2>
          <ol id="top-questions"></ol>
        </section>
        <section>
          <h2>低信心問題</h2>
          <ul id="low-confidence"></ul>
        </section>
      </div>

      <section class="admin-cases">
        <div class="case-toolbar">
          <label for="case-mode">案例模式</label>
          <select id="case-mode">
            <option value="all" selected>全部</option>
            <option value="low">低信心</option>
            <option value="down">負評</option>
          </select>
          <button id="refresh-cases" type="button">更新案例</button>
          <a id="download-csv" href="/api/admin/cases.csv?mode=all&limit=200">下載 CSV</a>
        </div>
        <div class="case-table-wrap">
          <table class="case-table">
            <thead>
              <tr>
                <th>時間</th>
                <th>問題</th>
                <th>信心</th>
                <th>回饋</th>
                <th>結論</th>
              </tr>
            </thead>
            <tbody id="case-table-body"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-report">
        <div class="case-toolbar">
          <button id="generate-report" type="button">生成今日報表</button>
          <a id="download-report-csv" href="/api/admin/cases.csv?mode=low&limit=200">下載低信心 CSV</a>
        </div>
        <pre id="report-content" class="report-box">尚未載入報表</pre>
      </section>
    </section>
  </main>

  <script src="/web/admin.js"></script>
</body>
</html>
